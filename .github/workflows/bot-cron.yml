name: Alpha Omega Bot Engine

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

      INDODAX_API_KEY: ${{ secrets.INDODAX_API_KEY }}
      INDODAX_SECRET_KEY: ${{ secrets.INDODAX_SECRET_KEY }}

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      SUMOPOD_API_KEY: ${{ secrets.SUMOPOD_API_KEY }}
      SUMOPOD_BASE_URL: ${{ secrets.SUMOPOD_BASE_URL }}
      SUMOPOD_FREE_MODELS: ${{ secrets.SUMOPOD_FREE_MODELS }}
      SUMOPOD_FALLBACK_MODELS: ${{ secrets.SUMOPOD_FALLBACK_MODELS }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run Autopilot Engine
        run: npm run bot -- autopilot